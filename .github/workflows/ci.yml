# Authored: Albert Lane | Documented: Claude Sonnet 4.6 | 2026-06-12
name: CI

on:
  push:
    branches: [main, 'claude/**']
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  health:
    name: JSON and asset health
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.12'

      - name: Validate JSON files
        run: |
          find . -name '*.json' -not -path './.git/*' | while read f; do
            python3 -c "import json; json.load(open('$f'))" && echo "[OK] $f" || { echo "[FAIL] $f"; exit 1; }
          done

      - name: XML well-formedness
        run: |
          find . -name '*.xml' -not -path './.git/*' | while read f; do
            python3 -c "import xml.etree.ElementTree as ET; ET.parse('$f')" && echo "[OK] $f" || { echo "[FAIL] $f"; exit 1; }
          done

      - name: Verify CLAUDE.md present
        run: test -f CLAUDE.md && echo '[OK] CLAUDE.md present' || { echo '[FAIL] CLAUDE.md missing'; exit 1; }
