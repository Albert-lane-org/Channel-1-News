# Authored: Albert Lane | Documented: Claude Sonnet 4.6 | 2026-06-12
# Minimal CI for channel-1-news — validates the assets that exist today.
# Extend with tsc/wrangler deploy checks once package.json is added.

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    name: Validate repo assets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: XML well-formedness
        run: |
          python3 - <<'EOF'
          import sys, xml.etree.ElementTree as ET
          from pathlib import Path
          failed = False
          for p in Path(".").rglob("*.xml"):
              if ".git" in p.parts:
                  continue
              try:
                  ET.parse(p)
                  print(f"OK   {p}")
              except ET.ParseError as e:
                  print(f"FAIL {p}: {e}")
                  failed = True
          sys.exit(1 if failed else 0)
          EOF

      - name: TOML validation
        run: |
          python3 - <<'EOF'
          import sys, tomllib
          from pathlib import Path
          failed = False
          for p in Path(".").rglob("*.toml"):
              if ".git" in p.parts:
                  continue
              try:
                  tomllib.loads(p.read_text())
                  print(f"OK   {p}")
              except tomllib.TOMLDecodeError as e:
                  print(f"FAIL {p}: {e}")
                  failed = True
          sys.exit(1 if failed else 0)
          EOF

      - name: Ruby syntax check
        run: |
          for f in $(git ls-files '*.rb'); do
            ruby -c "$f"
          done

      - name: TypeScript worker presence
        run: |
          test -f news-mesh-worker.ts && echo "news-mesh-worker.ts present"
          # Full tsc --noEmit gate deferred: no package.json/tsconfig.json yet.
