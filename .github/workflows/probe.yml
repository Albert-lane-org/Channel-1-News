# Temporary diagnostic: isolates startup_failure cause.
# Job A uses no marketplace actions; if A runs while ci.yml startup-fails,
# the repo/org "allowed actions" policy is blocking actions/checkout.
name: Probe

on:
  push:
    branches: ['claude/**']

permissions:
  contents: read

jobs:
  no-actions:
    runs-on: ubuntu-latest
    steps:
      - name: Plain run step
        run: echo "probe OK — runner reachable, no marketplace actions used"
